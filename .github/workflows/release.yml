name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -trimpath \
            -ldflags "-X github.com/thebtf/mcp-mux/internal/mux.Version=${VERSION}" \
            -o mcp-mux-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/mcp-mux
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-mux-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mcp-mux-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create release if it doesn't exist yet, otherwise just upload assets
          if gh release view ${GITHUB_REF_NAME} >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} exists, uploading binaries"
            gh release upload ${GITHUB_REF_NAME} artifacts/mcp-mux-* --clobber
          else
            echo "Creating release ${GITHUB_REF_NAME}"
            gh release create ${GITHUB_REF_NAME} \
              --title "mcp-mux ${GITHUB_REF_NAME}" \
              --generate-notes \
              artifacts/mcp-mux-*
          fi
